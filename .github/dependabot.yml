version: 2
updates:
  - package-ecosystem: docker
    directory: /dockerfiles
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Pacific/Auckland
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Pacific/Auckland
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps)"
