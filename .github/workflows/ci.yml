name: Build, Scan, Test and Publish

on:
  push:
    branches: [main]
    paths:
      - "dockerfiles/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "dockerfiles/**"
      - "tests/**"
      - ".github/workflows/ci.yml"

env:
  REGISTRY: ghcr.io

jobs:
  # ──────────────────────────────────────────────
  # Discover which *.dockerfile images have been
  # changed (or all of them if ci.yml changed) and
  # expose the list as a JSON array for the matrix
  # jobs below.
  #
  # Supports nested image folders, e.g.:
  #   dockerfiles/developer/alpine.dockerfile
  #   → image name: developer/alpine
  #   → published:  ghcr.io/<org>/developer/alpine
  # ──────────────────────────────────────────────
  prepare:
    name: Discover changed images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      images: ${{ steps.list.outputs.images }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed images
        id: list
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          # Fall back to empty-tree SHA when there is no previous commit
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base=$(git hash-object -t tree /dev/null)
          fi

          changed=$(git diff --name-only "$base" HEAD)
          echo "Changed files:"
          echo "$changed"

          # If the workflow file itself changed, rebuild every image
          if echo "$changed" | grep -q "^\.github/workflows/ci\.yml$"; then
            echo "ci.yml changed — including all images"
            images=$(
              find dockerfiles -name "*.dockerfile" \
                | sed 's|^dockerfiles/||; s|\.dockerfile$||' \
                | sort \
                | jq -R -s -c 'split("\n") | map(select(length > 0))'
            )
          else
            # Derive affected image names from changed paths:
            #   dockerfiles/**/*.dockerfile     → image name (strip prefix/suffix)
            #   tests/<folder>/test.sh          → all images in that folder
            #   tests/<folder>/<image>.sh       → that specific image
            images=$(
              echo "$changed" | while IFS= read -r f; do
                [ -z "$f" ] && continue
                case "$f" in
                  dockerfiles/*.dockerfile)
                    echo "$f" | sed 's|^dockerfiles/||; s|\.dockerfile$||'
                    ;;
                  tests/*/test.sh)
                    folder=$(echo "$f" | cut -d/ -f2)
                    # flat image with same name as folder?
                    [ -f "dockerfiles/${folder}.dockerfile" ] && echo "$folder"
                    # nested images inside the folder?
                    find "dockerfiles/${folder}" -name "*.dockerfile" 2>/dev/null \
                      | sed "s|^dockerfiles/||; s|\.dockerfile$||"
                    ;;
                  tests/*/*.sh)
                    folder=$(echo "$f" | cut -d/ -f2)
                    img=$(basename "$f" .sh)
                    [ -f "dockerfiles/${folder}/${img}.dockerfile" ] && echo "${folder}/${img}"
                    ;;
                esac
              done \
              | sort -u \
              | while IFS= read -r name; do
                  [ -z "$name" ] && continue
                  [ -f "dockerfiles/${name}.dockerfile" ] && echo "$name"
                done \
              | jq -R -s -c 'split("\n") | map(select(length > 0))'
            )
          fi

          echo "images=$images" >> "$GITHUB_OUTPUT"
          echo "Found images: $images"

  # ──────────────────────────────────────────────
  # CodeQL
  # Analyses the repository source (GitHub Actions
  # workflows) for security vulnerabilities and
  # uploads results to the Security tab.
  # ──────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.2
        with:
          languages: actions

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.36.2
        with:
          category: /language:actions

  # ──────────────────────────────────────────────
  # Build → Scan → Test
  # Runs for every image in parallel.
  # The scan uploads a SARIF report to the GitHub
  # Security tab and fails on CRITICAL/HIGH CVEs.
  # Tests mount tests/<image>/ into the container
  # and execute test.sh inside it.
  # ──────────────────────────────────────────────
  build-scan-test:
    name: Build / Scan / Test – ${{ matrix.image }}
    needs:
      - prepare
      - codeql
    if: needs.prepare.outputs.images != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.prepare.outputs.images) }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: dockerfiles/${{ matrix.image }}.dockerfile
          push: false
          load: true
          tags: localhost/${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Scan image with Trivy for SARIF upload
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost/${{ matrix.image }}:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          ignore-unfixed: false
          exit-code: "0"

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v4.36.2
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.image }}

      - name: Enforce Trivy policy (CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost/${{ matrix.image }}:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Scan image with Trivy for PR summary
        if: always() && github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost/${{ matrix.image }}:ci
          format: json
          output: trivy-results-pr.json
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          ignore-unfixed: false
          exit-code: "0"

      - name: Build Trivy PR summary
        if: always() && github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          critical=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results-pr.json)
          high=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results-pr.json)
          medium=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results-pr.json)
          low=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' trivy-results-pr.json)
          unknown=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="UNKNOWN")] | length' trivy-results-pr.json)
          total=$((critical + high + medium + low + unknown))

          {
            echo "<!-- trivy-pr-comment:${{ matrix.image }} -->"
            echo "### Trivy results: \`${{ matrix.image }}\`"
            echo
            echo "| Severity | Count |"
            echo "| --- | ---: |"
            echo "| CRITICAL | ${critical} |"
            echo "| HIGH | ${high} |"
            echo "| MEDIUM | ${medium} |"
            echo "| LOW | ${low} |"
            echo "| UNKNOWN | ${unknown} |"
            echo
            if [ "$total" -eq 0 ]; then
              echo "No vulnerabilities found."
            else
              echo "<details><summary>All findings (${total})</summary>"
              echo
              echo "| Severity | ID | Package | Installed | Fixed |"
              echo "| --- | --- | --- | --- | --- |"
              jq -r '
                [.Results[]?.Vulnerabilities[]?]
                | sort_by(
                    if .Severity=="CRITICAL" then 0
                    elif .Severity=="HIGH" then 1
                    elif .Severity=="MEDIUM" then 2
                    elif .Severity=="LOW" then 3
                    else 4 end,
                    .VulnerabilityID
                  )
                | .[]
                | [
                    .Severity,
                    (.VulnerabilityID // "N/A"),
                    (.PkgName // "N/A"),
                    (.InstalledVersion // "N/A"),
                    (if (.FixedVersion // "") == "" then "-" else .FixedVersion end)
                  ]
                | @tsv
              ' trivy-results-pr.json \
              | while IFS=$'\t' read -r sev id pkg inst fixed; do
                  printf '| %s | %s | %s | %s | %s |\n' "$sev" "$id" "$pkg" "$inst" "$fixed"
                done
              echo
              echo "</details>"
            fi
          } > trivy-pr-summary.md

          cat trivy-pr-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish Trivy summary comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v8.0.0
        env:
          IMAGE_NAME: ${{ matrix.image }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('trivy-pr-summary.md', 'utf8');
            const marker = `<!-- trivy-pr-comment:${process.env.IMAGE_NAME} -->`;
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Run tests
        run: |
          image="${{ matrix.image }}"
          image_tag="localhost/${image}:ci"

          if echo "$image" | grep -q '/'; then
            # Nested image (e.g. developer/alpine):
            # run shared folder-level test.sh then image-specific <name>.sh
            test_dir="tests/$(dirname "$image")"
            img_name="$(basename "$image")"
            folder_test="${test_dir}/test.sh"
            image_test="${test_dir}/${img_name}.sh"
          else
            # Flat image (e.g. alpine): run test.sh only
            test_dir="tests/${image}"
            folder_test="${test_dir}/test.sh"
            image_test=""
          fi

          ran_any=false

          if [ -f "$folder_test" ]; then
            echo "Running folder tests from $folder_test …"
            docker run --rm \
              --volume "${{ github.workspace }}/${test_dir}:/tests:ro" \
              "$image_tag" \
              /bin/sh /tests/test.sh
            ran_any=true
          fi

          if [ -n "$image_test" ] && [ -f "$image_test" ]; then
            echo "Running image tests from $image_test …"
            docker run --rm \
              --volume "${{ github.workspace }}/${test_dir}:/tests:ro" \
              "$image_tag" \
              /bin/sh "/tests/$(basename "$image_test")"
            ran_any=true
          fi

          if [ "$ran_any" = "false" ]; then
            echo "No test scripts found — skipping tests."
          fi

  # ──────────────────────────────────────────────
  # Publish
  # Only runs on push to main after all
  # build-scan-test jobs pass.
  # Images are tagged with the Git SHA and 'latest'.
  # ──────────────────────────────────────────────
  publish:
    name: Publish – ${{ matrix.image }}
    needs: [prepare, build-scan-test]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.prepare.outputs.images != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.prepare.outputs.images) }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}/blob/main/dockerfiles/${{ matrix.image }}.dockerfile
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: dockerfiles/${{ matrix.image }}.dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
